---
- name: Check if secrets exist in backup
  kubernetes.core.k8s_exec:
    namespace: "{{ backup_pvc_namespace }}"
    pod: "{{ ansible_operator_meta.name }}-db-management"
    command: >-
      sh -c "test -f '{{ backup_dir }}/secrets.yml' && echo 'exists' || echo 'missing'"
  register: _secrets_backup_check

- block:
    - name: Create temporary secrets file
      tempfile:
        state: file
        suffix: .yml
      register: _tmp_secrets

    - name: Copy secrets from backup PVC
      kubernetes.core.k8s_cp:
        namespace: "{{ backup_pvc_namespace }}"
        pod: "{{ ansible_operator_meta.name }}-db-management"
        remote_path: "{{ backup_dir }}/secrets.yml"
        local_path: "{{ _tmp_secrets.path }}"
        state: from_pod
      no_log: "{{ no_log }}"

    - name: Include secret vars from backup
      include_vars: "{{ _tmp_secrets.path }}"
      no_log: "{{ no_log }}"

    - name: Restore MCP telemetry HMAC secret
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: '{{ secrets.mcpTelemetryHmacSecret.name }}'
            namespace: '{{ ansible_operator_meta.namespace }}'
          type: '{{ secrets.mcpTelemetryHmacSecret.type }}'
          data: '{{ secrets.mcpTelemetryHmacSecret.data }}'
      no_log: "{{ no_log }}"
      when: secrets.mcpTelemetryHmacSecret is defined

  always:
    - name: Remove temporary secrets file
      file:
        path: "{{ _tmp_secrets.path }}"
        state: absent
      when: _tmp_secrets is defined

  when: "'exists' in _secrets_backup_check.stdout"
