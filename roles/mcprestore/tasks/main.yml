---
- name: Look up details for this restore object
  kubernetes.core.k8s_info:
    api_version: "mcpconnect.ansible.com/v1alpha1"
    kind: "AnsibleMCPConnectRestore"
    name: "{{ ansible_operator_meta.name }}"
    namespace: "{{ ansible_operator_meta.namespace }}"
  register: this_restore

- block:
    - include_tasks: init.yml
    - include_tasks: secrets.yml
    - include_tasks: configmap.yml
    - include_tasks: cleanup.yml
    - include_tasks: update_status.yml

  when:
    - this_restore['resources'][0]['status']['restoreComplete'] is not defined
      or not this_restore['resources'][0]['status']['restoreComplete']
