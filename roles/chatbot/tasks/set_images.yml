---
# =======================================
# Chatbot image
# ---------------------------------------
- name: Set default Chatbot container image
  ansible.builtin.set_fact:
    _default_chatbot_image: "{{ _chatbot_image }}:{{ _chatbot_image_version }}"

- name: Set user provided image
  ansible.builtin.set_fact:
    _custom_chatbot_image: "{{ chatbot_image }}:{{ chatbot_image_version }}"
  when:
    - chatbot_image | default([]) | length
    - chatbot_image_version is defined or chatbot_image_version != ''

- name: Set Chatbot image URL
  ansible.builtin.set_fact:
    _chatbot_image: >-
      {{ _custom_chatbot_image |
         default(lookup('env', 'RELATED_IMAGE_ANSIBLE_AI_CONNECT_CHATBOT')) |
         default(_default_chatbot_image, true) }}
# =======================================

# =======================================
# Chatbot BYOK
# ---------------------------------------

- name: Create the chatbot BYOK configuration
  when: chatbot_extra_settings is defined
  block:
    - name: Set Chatbot BYOK image version when defined and not empty
      ansible.builtin.set_fact:
        _chatbot_byok_image_version: "{{ chatbot_extra_settings['chatbot_byok_image_version'] | string }}"
      when:
        - chatbot_extra_settings['chatbot_byok_image_version'] is defined
        - chatbot_extra_settings['chatbot_byok_image_version'] | string | length

    - name: Set Chatbot BYOK image default version when not defined
      ansible.builtin.set_fact:
        _chatbot_byok_image_version: "latest"
      when:
        - _chatbot_byok_image_version is not defined

    - name: Set Chatbot BYOK image when defined and not empty
      ansible.builtin.set_fact:
        _chatbot_byok_image: "{{ chatbot_extra_settings['chatbot_byok_image'] | string }}:{{ _chatbot_byok_image_version }}"
      when:
        - chatbot_extra_settings['chatbot_byok_image'] is defined
        - chatbot_extra_settings['chatbot_byok_image'] | string | length
        - _chatbot_byok_image_version is defined

    - name: Set Chat BYOK storage size
      ansible.builtin.set_fact:
        _chatbot_byok_storage_size: "{{ chatbot_extra_settings['chatbot_byok_storage_size'] | default('2Gi') | string }}"
# =======================================

