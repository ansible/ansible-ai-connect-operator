---
- block:
    - name: Get API Pod details
      kubernetes.core.k8s_info:
        namespace: '{{ namespace }}'
        kind: Pod
        label_selectors:
          - app.kubernetes.io/name = ansiblemcpconnect-sample
      register: mcpserver_pod

    - name: Get API Service details
      kubernetes.core.k8s_info:
        namespace: '{{ namespace }}'
        kind: Service
        label_selectors:
          - app.kubernetes.io/name = ansiblemcpconnect-sample
      register: mcpserver_service

    - name: Get Health Check
      ansible.builtin.uri:
        url: 'http://{{ service_host_ip }}:{{ service_host_port }}/api/v1/health'
        return_content: true
      vars:
        service_host_ip: '{{ mcpserver_pod.resources[0].status.hostIP }}'
        service_host_port: '{{ mcpserver_service.resources[0].spec.ports[0].nodePort }}'
      register: service_host_response

    - name: Assert Health Check response
      ansible.builtin.assert:
        that:
        - service_host_response.status == 200
        - service_host_response.json.status == 'ok'
        fail_msg: /check endpoint did not return expected response. Expected HTTP200, OK.

    - name: Get telemetry HMAC key secret
      kubernetes.core.k8s_info:
        kind: Secret
        name: ansiblemcpconnect-sample-telemetry-hmac-secret
        namespace: '{{ namespace }}'
      register: telemetry_hmac_secret

    - name: Assert telemetry HMAC key secret exists
      ansible.builtin.assert:
        that:
          - telemetry_hmac_secret.resources | length == 1
        fail_msg: Telemetry HMAC key secret was not created.

    - name: Assert telemetry HMAC key secret contains expected key
      ansible.builtin.assert:
        that:
          - "'telemetry_hmac_key' in telemetry_hmac_secret.resources[0].data"
        fail_msg: Telemetry HMAC key secret does not contain 'telemetry_hmac_key' data key.

    - name: Assert telemetry HMAC key is 64 characters (256-bit hex)
      ansible.builtin.assert:
        that:
          - (telemetry_hmac_secret.resources[0].data.telemetry_hmac_key | b64decode | length) == 64
        fail_msg: Telemetry HMAC key is not 64 characters long.

    - name: Get MCP Server deployment
      kubernetes.core.k8s_info:
        kind: Deployment
        namespace: '{{ namespace }}'
        label_selectors:
          - app.kubernetes.io/name = ansiblemcpconnect-sample
      register: mcpserver_deployment

    - name: Assert TELEMETRY_HMAC_KEY env var is set in deployment
      ansible.builtin.assert:
        that:
          - mcpserver_deployment.resources[0].spec.template.spec.containers[0].env | selectattr('name', 'equalto', 'TELEMETRY_HMAC_KEY') | list | length > 0
        fail_msg: TELEMETRY_HMAC_KEY environment variable is not set in MCP Server deployment.

    - name: Get MCP Server ConfigMap
      kubernetes.core.k8s_info:
        kind: ConfigMap
        name: ansiblemcpconnect-sample-ansible-mcp-connect-env-properties
        namespace: '{{ namespace }}'
      register: mcpserver_configmap

    - name: Assert ConfigMap exists
      ansible.builtin.assert:
        that:
          - mcpserver_configmap.resources | length == 1
        fail_msg: MCP Server ConfigMap was not created.

    - name: Assert INSTALLER_ID is set in ConfigMap
      ansible.builtin.assert:
        that:
          - "'INSTALLER_ID' in mcpserver_configmap.resources[0].data"
          - mcpserver_configmap.resources[0].data.INSTALLER_ID | length > 0
        fail_msg: INSTALLER_ID is not set in MCP Server ConfigMap.

    - name: Assert INTERNAL_EMAIL_DOMAINS is set in ConfigMap
      ansible.builtin.assert:
        that:
          - "'INTERNAL_EMAIL_DOMAINS' in mcpserver_configmap.resources[0].data"
          - "'redhat.com' in mcpserver_configmap.resources[0].data.INTERNAL_EMAIL_DOMAINS"
        fail_msg: INTERNAL_EMAIL_DOMAINS is not set correctly in MCP Server ConfigMap.

    # -- Idempotency test: verify re-reconciliation preserves telemetry values
    - name: Record HMAC key before re-reconciliation
      ansible.builtin.set_fact:
        _hmac_key_before: '{{ telemetry_hmac_secret.resources[0].data.telemetry_hmac_key }}'
        _installer_id_before: '{{ mcpserver_configmap.resources[0].data.INSTALLER_ID }}'

    - name: Delete MCP Server pod to trigger re-reconciliation
      kubernetes.core.k8s:
        kind: Pod
        namespace: '{{ namespace }}'
        name: '{{ mcpserver_pod.resources[0].metadata.name }}'
        state: absent
        wait: true

    - name: Wait for MCP Server pod to be recreated
      kubernetes.core.k8s_info:
        namespace: '{{ namespace }}'
        kind: Pod
        label_selectors:
          - app.kubernetes.io/name = ansiblemcpconnect-sample
        field_selectors:
          - status.phase=Running
      register: mcpserver_pod_after
      retries: 30
      delay: 10
      until: mcpserver_pod_after.resources | length > 0

    - name: Get telemetry HMAC key secret after re-reconciliation
      kubernetes.core.k8s_info:
        kind: Secret
        name: ansiblemcpconnect-sample-telemetry-hmac-secret
        namespace: '{{ namespace }}'
      register: telemetry_hmac_secret_after

    - name: Get MCP Server ConfigMap after re-reconciliation
      kubernetes.core.k8s_info:
        kind: ConfigMap
        name: ansiblemcpconnect-sample-ansible-mcp-connect-env-properties
        namespace: '{{ namespace }}'
      register: mcpserver_configmap_after

    - name: Assert HMAC key is unchanged after re-reconciliation
      ansible.builtin.assert:
        that:
          - telemetry_hmac_secret_after.resources[0].data.telemetry_hmac_key == _hmac_key_before
        fail_msg: >-
          HMAC key changed after re-reconciliation.
          Before: {{ _hmac_key_before }}
          After: {{ telemetry_hmac_secret_after.resources[0].data.telemetry_hmac_key }}

    - name: Assert INSTALLER_ID is unchanged after re-reconciliation
      ansible.builtin.assert:
        that:
          - mcpserver_configmap_after.resources[0].data.INSTALLER_ID == _installer_id_before
        fail_msg: >-
          INSTALLER_ID changed after re-reconciliation.
          Before: {{ _installer_id_before }}
          After: {{ mcpserver_configmap_after.resources[0].data.INSTALLER_ID }}
