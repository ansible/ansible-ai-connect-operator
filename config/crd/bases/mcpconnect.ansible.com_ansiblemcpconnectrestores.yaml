---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: ansiblemcpconnectrestores.mcpconnect.ansible.com
spec:
  group: mcpconnect.ansible.com
  names:
    kind: AnsibleMCPConnectRestore
    listKind: AnsibleMCPConnectRestoreList
    plural: ansiblemcpconnectrestores
    singular: ansiblemcpconnectrestore
  scope: Namespaced
  versions:
  - name: v1alpha1
    served: true
    storage: true
    subresources:
      status: {}
    schema:
      openAPIV3Schema:
        type: object
        description: Schema validation for the AnsibleMCPConnectRestore CRD
        properties:
          apiVersion:
            description: 'APIVersion defines the versioned schema of this representation
              of an object.'
            type: string
          kind:
            description: 'Kind is a string value representing the REST resource this
              object represents.'
            type: string
          metadata:
            type: object
          spec:
            type: object
            required:
            - deployment_name
            properties:
              deployment_name:
                description: Name of the AnsibleMCPConnect deployment to restore
                type: string
              backup_name:
                description: AnsibleMCPConnectBackup CR name to restore from
                type: string
              backup_pvc:
                description: PVC containing the backup
                type: string
              backup_dir:
                description: Backup directory name on the PVC
                type: string
              no_log:
                description: Suppress logging of sensitive data
                type: boolean
                default: true
              set_self_labels:
                description: Maintain recommended labels
                type: boolean
                default: true
          status:
            type: object
            properties:
              restoreComplete:
                description: Flag indicating restore completion
                type: boolean
              conditions:
                description: Status conditions
                items:
                  properties:
                    lastTransitionTime:
                      type: string
                    reason:
                      type: string
                    status:
                      type: string
                    type:
                      type: string
                  type: object
                type: array
