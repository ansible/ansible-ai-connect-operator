---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: ansiblemcpconnectbackups.mcpconnect.ansible.com
spec:
  group: mcpconnect.ansible.com
  names:
    kind: AnsibleMCPConnectBackup
    listKind: AnsibleMCPConnectBackupList
    plural: ansiblemcpconnectbackups
    singular: ansiblemcpconnectbackup
  scope: Namespaced
  versions:
  - name: v1alpha1
    served: true
    storage: true
    subresources:
      status: {}
    schema:
      openAPIV3Schema:
        type: object
        description: Schema validation for the AnsibleMCPConnectBackup CRD
        properties:
          apiVersion:
            description: 'APIVersion defines the versioned schema of this representation
              of an object.'
            type: string
          kind:
            description: 'Kind is a string value representing the REST resource this
              object represents.'
            type: string
          metadata:
            type: object
          spec:
            type: object
            required:
            - deployment_name
            properties:
              deployment_name:
                description: Name of the AnsibleMCPConnect deployment to be backed up
                type: string
              backup_pvc:
                description: Name of the PVC to store the backup
                type: string
              backup_pvc_namespace:
                description: Namespace the PVC is in
                type: string
              backup_storage_requirements:
                description: Storage requirements for the backup PVC
                type: string
              backup_storage_class:
                description: Storage class to use when creating PVC for backup
                type: string
              clean_backup_on_delete:
                description: Flag to indicate if backup should be deleted on PVC if backup object is deleted
                type: boolean
              no_log:
                description: Suppress logging of sensitive data
                type: boolean
                default: true
              set_self_labels:
                description: Maintain recommended labels
                type: boolean
                default: true
          status:
            type: object
            properties:
              backupDirectory:
                description: Backup directory name on the PVC
                type: string
              backupClaim:
                description: Backup PVC name
                type: string
              conditions:
                description: Status conditions
                items:
                  properties:
                    lastTransitionTime:
                      type: string
                    reason:
                      type: string
                    status:
                      type: string
                    type:
                      type: string
                  type: object
                type: array
