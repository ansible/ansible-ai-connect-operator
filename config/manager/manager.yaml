apiVersion: v1
kind: Namespace
metadata:
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: namespace
    app.kubernetes.io/instance: system
    app.kubernetes.io/component: ansibleaiconnect-manager
    app.kubernetes.io/created-by: ansible-ai-connect-operator
    app.kubernetes.io/part-of: ansible-ai-connect-operator
    app.kubernetes.io/managed-by: kustomize
  name: system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-manager
  namespace: system
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: deployment
    app.kubernetes.io/instance: controller-manager
    app.kubernetes.io/component: ansibleaiconnect-manager
    app.kubernetes.io/created-by: ansible-ai-connect-operator
    app.kubernetes.io/part-of: ansible-ai-connect-operator
    app.kubernetes.io/managed-by: kustomize
spec:
  selector:
    matchLabels:
      control-plane: controller-manager
  replicas: 1
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: ansible-lightspeed-manager
      labels:
        control-plane: controller-manager
    spec:
      # TODO(user): Uncomment the following code to configure the nodeAffinity expression
      # according to the platforms which are supported by your solution.
      # It is considered best practice to support multiple architectures. You can
      # build your manager image using the makefile target docker-buildx.
      # affinity:
      #   nodeAffinity:
      #     requiredDuringSchedulingIgnoredDuringExecution:
      #       nodeSelectorTerms:
      #         - matchExpressions:
      #           - key: kubernetes.io/arch
      #             operator: In
      #             values:
      #               - amd64
      #               - arm64
      #               - ppc64le
      #               - s390x
      #           - key: kubernetes.io/os
      #             operator: In
      #             values:
      #               - linux
      securityContext:
        runAsNonRoot: true
      containers:
      - args:
        - --leader-elect
        - --leader-election-id=ansible-ai-connect-operator
        - --health-probe-bind-address=:6789
        image: controller:latest
        imagePullPolicy: IfNotPresent
        name: ansible-lightspeed-manager
        env:
          - name: ANSIBLE_GATHERING
            value: explicit
          - name: ANSIBLE_VERBOSITY
            value: "0"
          - name: ANSIBLE_DEBUG_LOGS
            value: 'false'
          - name: WATCH_NAMESPACE
            valueFrom:
              fieldRef:
                fieldPath: metadata.namespace
          - name: RELATED_IMAGE_ANSIBLE_MCP_SERVER
            value: quay.io/ttakamiy/aap-mcp-server:latest
          - name: RELATED_IMAGE_ANSIBLE_AI_CONNECT
            value: quay.io/ansible/wisdom-service:latest
          - name: RELATED_IMAGE_ANSIBLE_AI_CONNECT_CHATBOT
            value: quay.io/ansible/ansible-chatbot-stack:latest
          - name: RELATED_IMAGE_ANSIBLE_AI_CONNECT_CHATBOT_MCP_GATEWAY
            value: quay.io/ansible/ansible-mcp-gateway:latest
          - name: RELATED_IMAGE_ANSIBLE_AI_CONNECT_CHATBOT_MCP_CONTROLLER
            value: quay.io/ansible/ansible-mcp-controller:latest
          - name: RELATED_IMAGE_ANSIBLE_AI_CONNECT_CHATBOT_MCP_LIGHTSPEED
            value: quay.io/ansible/ansible-mcp-lightspeed:latest
          - name: RELATED_IMAGE_ANSIBLE_AI_CONNECT_CHATBOT_RAG_DB
            value: quay.io/ansible/aap-rag-content:latest
          - name: RELATED_IMAGE_ANSIBLE_AI_CONNECT_POSTGRES
            value: quay.io/sclorg/postgresql-15-c9s:latest
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - "ALL"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 6789
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 6789
          initialDelaySeconds: 5
          periodSeconds: 10
        # TODO(user): Configure the resources accordingly based on the project requirements.
        # More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
        resources:
          limits:
            cpu: 500m
            memory: 768Mi
          requests:
            cpu: 10m
            memory: 256Mi
      serviceAccountName: controller-manager
      imagePullSecrets:
        - name: redhat-operators-pull-secret
      terminationGracePeriodSeconds: 10
