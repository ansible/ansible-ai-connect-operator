# sonar.projectKey and sonar.organization are set dynamically
# in .github/workflows/sonarcloud.yml based on the repo owner and name

# Project metadata
sonar.projectName=Ansible AI Connect Operator
sonar.projectVersion=upstream-dev

# Define source directories for analysis
sonar.sources=roles/,playbooks/,config/,molecule/,watches.yaml

# Exclude test files and generated content from source analysis
sonar.exclusions=\
  **/.venv/**,\
  **/venv/**,\
  **/__pycache__/**,\
  **/node_modules/**,\
  **/vendor/**,\
  bundle/**,\
  .tekton/**,\
  molecule/default/templates/secrets/**,\
  **/test_*.py,\
  molecule/requirements.txt,\
  molecule/requirements.yml

# Include test files in test scope
sonar.test.inclusions=\
  molecule/**/*.yml,\
  molecule/**/*.yaml,\
  **/test_*.py

# Disable duplication detection for molecule test templates
# as they are intentionally similar across different test scenarios
sonar.cpd.exclusions=\
  molecule/default/templates/**,\
  molecule/kind/templates/**

# Wait for quality gate results
sonar.qualitygate.wait=true

# Language-specific settings
# Note: SonarCloud has limited YAML analysis capabilities
# The main value comes from security scanning and project health metrics
sonar.lang.patterns.yaml=**/*.yaml,**/*.yml

# Source encoding
sonar.sourceEncoding=UTF-8

# Security scanning rules
# Enable security hotspot detection for YAML configuration files
# This helps identify potential security issues in Kubernetes manifests,
# Ansible playbooks, and CI/CD configurations
sonar.security.hotspots.includePatterns=**/*.yaml,**/*.yml
